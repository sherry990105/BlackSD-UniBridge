<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유저 관리</title>
  <link rel="stylesheet" href="./../../../assets/css/admin/adminUserManagement/user.css" />
</head>
<body>

  <div id="header-wrap"></div>

  <div class="page-wrap">

    <!-- 상단: 타이틀 + 필터 -->
    <div class="list-header">
      <div class="list-title">
        <span class="list-title-icon">
          <img src="./../../../assets/img/admin/유저들_아이콘.png" alt="유저 아이콘" style="width:36px;height:36px;" />
        </span>
        전체 유저
      </div>

      <div class="filter-btns">
        <button class="btn-filter" id="btnFilterType">유형</button>
        <button class="btn-filter" id="btnFilterStatus">상태</button>
      </div>
    </div>

    <!-- 유저 카드 리스트 -->
    <div class="user-list" id="userList"></div>

  </div>

  <script>
  fetch("/header/adminHeader.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("header-wrap").innerHTML = html;
      const s = document.createElement("script");
      s.src = "/header/adminHeader.js";
      document.body.appendChild(s);
    });
  </script>

  <!-- user.js보다 먼저 선언 → avatarSVG / chatSVG 변수 오버라이드 -->
  <script>
  const avatarSVG = `<img src="./../../../assets/img/admin/유저_아이콘.png" alt="유저 아이콘" style="width:40px;height:40px;" />`;

  const chatSVG = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="9" y1="10" x2="15" y2="10" stroke-linecap="round"/>
      <line x1="9" y1="14" x2="13" y2="14" stroke-linecap="round"/>
    </svg>`;
  </script>

  <script src="./../../../assets/js/admin/adminUserManagement/user.js"></script>
</body>
</html>
