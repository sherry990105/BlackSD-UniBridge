<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/header.css" />
    <link rel="stylesheet" href="/assets/css/footer.css" />
    <link rel="stylesheet" href="/assets/css/user/siginIn/login.css">
    <script defer src="/assets/js/user/siginIn/login.js"></script>
</head>
<body>
    
    <div id="headerContainer"></div>

    <main>
        <div class="content">
            <div class="loginBox">
                <div class="loginText">로그인</div>
                <form action="" id="login">
                    <div class="input-group">
                        <label>아이디</label>
                        <input type="text" id="userId" class="userInput">
                    </div>

                    <div class="input-group">
                        <label>비밀번호</label>
                        <input type="password" id="userPw" class="userInput">
                    </div>

                    <div id="errorMsg" class="error"></div>

                    <button type="submit" class="loginBtn">로그인</button>
                </form>

                <a href=""><div class="signup">회원가입</div></a>
            </div>
        </div>
    </main>

    <script src="/assets/js/header.js"></script>
    <script src="/assets/js/footer.js"></script>
</body>
</html>
